volumes:
  open-webui-data: {}
  chroma-data: {}

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    network_mode: host
    gpus: all
    volumes:
      - ./ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chroma-server
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma-data:/chroma/chroma/
    network_mode: host
    restart: unless-stopped
    command: run --host 0.0.0.0 --port 9000

  open-webui:
    image: ghcr.io/open-webui/open-webui:dev
    container_name: open-webui
    network_mode: host
    depends_on:
      - ollama
      - chroma
    restart: always
    environment:
      - OLLAMA_BASE_URL=http://localhost:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - CHROMA_HTTP_HOST=127.0.0.1
      - CHROMA_HTTP_PORT=9000   # host-mapped port
    volumes:
      - open-webui-data:/app/backend/data

