servingEngineSpec:
  runtimeClassName: ""
  startupProbe:
    initialDelaySeconds: 90       # 80B models take time to shard across 4 GPUs
    periodSeconds: 15
    failureThreshold: 30
    httpGet:
      path: /health
      port: 8000
  modelSpec:
    - name: "qwen3-coder-next-fp8"
      repository: "lmcache/vllm-openai"
      tag: "latest"
      modelURL: "Qwen/Qwen3-Coder-Next-FP8"

      replicaCount: 1
      requestGPU: 4                  # 4x A5000 (96GB VRAM total)
      requestCPU: 8                  # Reduced to leave room for OS/K8s
      requestMemory: "90Gi"          # FIXED: Must be < 100GB physical RAM
      pvcStorage: "100Gi"            

      # --- TOOL CALLING CONFIGURATION ---
      enableTool: true
      toolCallParser: "qwen3_coder"

      vllmConfig:
        enableChunkedPrefill: true
        enablePrefixCaching: true    # REQUIRED for LMCache to function
        maxModelLen: 32768           # 64k is too high for 96GB VRAM with an 80B model
        extraArgs:
          - "--tensor-parallel-size"
          - "4"
          - "--gpu-memory-utilization"
          - "0.90"               # Headroom for MoE activations
          - "--trust-remote-code"
          - "--enforce-eager"    # Prevents OOM/Halt during Graph Capture

      lmcacheConfig:
        enabled: true
        cpuOffloadingBufferSize: "30" # Reduced to fit in 80Gi RAM safely
        remoteStorageBackend: "file"
        remoteStoragePath: "/mnt/lmcache" 

      extraVolumeMounts:
        - name: vllm-storage
          mountPath: "/mnt/lmcache"

      env:
      - name: HUGGING_FACE_HUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: huggingface-credentials
            key: HUGGING_FACE_HUB_TOKEN
      - name: LMCACHE_LOCAL_DISK
        value: "file:///mnt/lmcache"
      
      shmSize: "40Gi" # Necessary for NCCL communication between the 4 GPUs